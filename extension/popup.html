<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 240px;
      padding: 16px;
      margin: 0;
      color: #1a1a1a;
      background: #fff;
    }
    h2 { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
    p { font-size: 12px; color: #6b7280; margin: 0 0 12px; line-height: 1.4; }
    .legend { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .dot {
      width: 10px; height: 10px;
      background: linear-gradient(120deg, #fef9c3, #fef08a);
      border: 1px solid #d97706; border-radius: 2px; display: inline-block;
    }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>Clarity</h2>
  <p>Highlights the sentences most worth reading on this page — clear writing that actually carries information.</p>
  <div class="legend"><span class="dot"></span> Yellow = clear &amp; high-signal</div>
  <p class="hint">Hover a highlight to see its score. Reload the page to re-run.</p>
</body>
</html>
