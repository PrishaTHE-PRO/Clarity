<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      margin: 0;
      padding: 16px;
      color: #111827;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 5px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.45;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
      color: #374151;
      font-size: 12px;
    }

    .bar {
      width: 4px;
      height: 22px;
      border-radius: 4px;
      background: #2563eb;
    }
  </style>
</head>
<body>
  <h2>Clarity</h2>
  <p>Use the side panel on the page to choose how much to read, switch reading modes, or search for specific passages.</p>
  <div class="status"><span class="bar"></span> Highlights preserve the original article text.</div>
</body>
</html>
